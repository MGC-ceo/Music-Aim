<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Aim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= LOGIN SCREEN ================= -->
<div id="loginScreen" class="screen">
  <h1>Login</h1>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login / Register</button>
</div>

<!-- ================= MENU ================= -->
<div id="menuScreen" class="screen hidden">
  <h1>Main Menu</h1>
  <button onclick="openPlay()">Play</button>
  <button onclick="openSettings()">Settings</button>
  <button onclick="openLeaderboard()">Leaderboard</button>
</div>

<!-- ================= SETTINGS ================= -->
<div id="settingsScreen" class="screen hidden">
  <h2>Settings</h2>

  <label>Music Volume</label>
  <input type="range" id="volume" min="0" max="100">

  <label>VFX</label>
  <input type="checkbox" id="vfxToggle">

  <button onclick="backToMenu()">Back</button>
</div>

<!-- ================= MAP SELECT ================= -->
<div id="playScreen" class="screen hidden">
  <h2>Select Map</h2>

  <div id="mapDisplay"></div>

  <button onclick="prevMap()">⬅</button>
  <button onclick="nextMap()">➡</button>
  <button onclick="startGame()">Start</button>

  <button onclick="backToMenu()">Back</button>
</div>

<!-- ================= LEADERBOARD ================= -->
<div id="leaderboardScreen" class="screen hidden">
  <h2>Leaderboard</h2>
  <div id="leaderboard"></div>
  <button onclick="backToMenu()">Back</button>
</div>

<!-- ================= GAME ================= -->
<canvas id="gameCanvas"></canvas>

<script src="script.js"></script>
</body>
</html>
